site_name: Liath Documentation
site_description: A programmable key-value database with Lua query language and AI capabilities
site_url: https://docs.incredlabs.com/liath
repo_url: https://github.com/incredlabs/liath
repo_name: incredlabs/liath

docs_dir: documentation

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            heading_level: 2
  - gen-files:
      scripts:
        - documentation/scripts/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Configuration: getting-started/configuration.md
  - Tutorials:
    - Basic Operations: tutorials/basic-operations.md
    - Using Namespaces: tutorials/namespaces.md
    - Lua Queries: tutorials/lua-queries.md
    - Vector Search & RAG: tutorials/vector-search.md
    - Building Plugins: tutorials/building-plugins.md
  - Reference:
    - CLI: reference/cli.md
    - HTTP API: reference/http-api.md
    - API Reference: reference/api/
  - Plugins:
    - Overview: plugins/overview.md
    - Database (db): plugins/db.md
    - Embeddings (embed): plugins/embed.md
    - Vector Database (vdb): plugins/vdb.md
    - LLM (llm): plugins/llm.md
    - File (file): plugins/file.md
    - Cache (cache): plugins/cache.md
    - Backup (backup): plugins/backup.md
    - Monitoring (monitor): plugins/monitor.md
  - Development:
    - Architecture: development/architecture.md
    - Plugin Development: development/plugin-development.md
    - Contributing: development/contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/incredlabs/liath
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/liath/
